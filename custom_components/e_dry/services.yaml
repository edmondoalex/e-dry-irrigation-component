start_zone:
  name: Start zone (base duration)
  description: Avvia una zona usando la durata base.
  fields:
    zone_id:
      name: Zona
      required: true

start_zone_for:
  name: Start zone for minutes
  description: Avvia una zona per un certo numero di minuti.
  fields:
    zone_id:
      name: Zona
      required: true
    minutes:
      name: Minuti
      required: true

stop_zone:
  name: Stop zone
  description: Ferma l'irrigazione di una zona.
  fields:
    zone_id:
      name: Zona
      required: true

update_zone:
  name: Update Zone
  description: Modifica il nome o la durata base di una zona.
  fields:
    zone_id:
      name: Zona
      description: Seleziona lo switch della zona da modificare.
      required: true
      selector:
        entity:
          domain: switch
          multiple: false
    name:
      name: Nuovo Nome
      description: Il nuovo nome da assegnare alla zona.
      required: false
      selector:
        text:
    base_minutes:
      name: Durata Base
      description: La nuova durata base in minuti.
      required: false
      selector:
        number:
          min: 1
          max: 60
          step: 1
    profile_id:
      name: Preset zona
      description: Preset comportamento zona da applicare a SmartCalc.
      required: false
      selector:
        text:

update_zone_profiles:
  name: Aggiorna preset zone
  description: Salva i preset custom persistenti usati dalle zone.
  fields:
    profiles:
      name: Preset custom
      description: Lista di preset custom con id, name, smart_multiplier e wind_sensitive.
      required: true
      selector:
        object:

update_program:
  name: Update Program
  description: Crea, modifica o elimina un programma di irrigazione.
  fields:
    program_id:
      name: ID Programma
      description: ID del programma da modificare. Se 0 o non trovato, ne crea uno nuovo.
      required: true
      selector:
        number:
          min: 0
          max: 100
    name:
      name: Nome
      description: Nome del programma.
      required: false
      selector:
        text:
    time:
      name: Orario
      description: Orario di avvio (HH:MM).
      required: false
      selector:
        time:
    days:
      name: Giorni
      description: Lista dei giorni (mon, tue, wed, thu, fri, sat, sun).
      required: false
      selector:
        select:
          options:
            - mon
            - tue
            - wed
            - thu
            - fri
            - sat
            - sun
          multiple: true
    zones:
      name: Zone
      description: Seleziona gli switch delle zone (es. switch.zona_1) oppure inserisci gli ID separati da virgola.
      required: false
      selector:
        entity:
          domain: switch
          multiple: true
    pause_minutes:
      name: Pausa
      description: Minuti di pausa tra le zone.
      required: false
      selector:
        number:
          min: 0
          max: 60
          step: 0.5
    enabled:
      name: Abilitato
      description: Abilita o disabilita il programma.
      required: false
      selector:
        boolean:
    delete_program:
      name: Elimina
      description: Se vero, elimina il programma specificato.
      required: false
      selector:
        boolean:

create_program:
  name: Crea programma
  description: Crea un nuovo programma di irrigazione persistente.
  fields:
    name:
      name: Nome
      description: Nome del programma.
      required: true
      selector:
        text:
    time:
      name: Orario
      description: Orario di avvio (HH:MM).
      required: true
      selector:
        time:
    days:
      name: Giorni
      description: Lista dei giorni (mon, tue, wed, thu, fri, sat, sun).
      required: true
      selector:
        select:
          options:
            - mon
            - tue
            - wed
            - thu
            - fri
            - sat
            - sun
          multiple: true
    zones:
      name: Zone
      description: ID zona o switch delle zone da includere.
      required: true
      selector:
        object:
    pause_minutes:
      name: Pausa
      description: Minuti di pausa tra le zone.
      required: false
      selector:
        number:
          min: 0
          max: 60
          step: 0.5
    enabled:
      name: Abilitato
      description: Abilita subito il programma.
      required: false
      selector:
        boolean:

update_weather_settings:
  name: Aggiorna tarature meteo
  description: Aggiorna endpoint e-SunMind, soglie meteo fallback e SmartCalc.
  fields:
    esunmind_weather_api_url:
      name: Endpoint meteo e-SunMind
      description: URL dell'endpoint /api/weather/irrigation usato come fonte meteo primaria.
      required: false
      selector:
        text:
    weather_max_age_seconds:
      name: Eta massima dato meteo
      description: Secondi oltre i quali il dato e-SunMind e considerato vecchio.
      required: false
      selector:
        number:
          min: 60
          max: 7200
          step: 60
    forecast_rain_skip_mm:
      name: Soglia pioggia prevista 24h
      description: Millimetri previsti nelle prossime 24h oltre cui saltare irrigazione.
      required: false
      selector:
        number:
          min: 0
          max: 50
          step: 0.5
    recent_rain_skip_mm:
      name: Soglia pioggia ultime 24h
      description: Millimetri caduti nelle ultime 24h oltre cui saltare irrigazione.
      required: false
      selector:
        number:
          min: 0
          max: 50
          step: 0.5
    enable_smart_calc:
      name: Abilita SmartCalc
      required: false
      selector:
        boolean:
    rain_sensor_entity_id:
      name: Sensore pioggia fallback
      required: false
      selector:
        entity:
          domain:
            - sensor
            - binary_sensor
            - input_boolean
    rain_threshold:
      name: Soglia pioggia fallback
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 0.1
    temp_sensor_entity_id:
      name: Sensore temperatura fallback
      required: false
      selector:
        entity:
          domain: sensor
    min_temp:
      name: Temperatura blocco gelo
      required: false
      selector:
        number:
          min: -10
          max: 20
          step: 0.5
    humidity_sensor_entity_id:
      name: Sensore umidita fallback
      required: false
      selector:
        entity:
          domain: sensor
    wind_sensor_entity_id:
      name: Sensore vento fallback
      required: false
      selector:
        entity:
          domain: sensor
    wind_threshold:
      name: Soglia vento
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 0.5

remove_stale_entities:
  name: Remove stale entities
  description: Rimuove entita obsolete del config entry corrente che contengono una stringa.
  fields:
    match:
      name: Testo da cercare
      description: Stringa da cercare in entity_id, unique_id o nome originale.
      required: false
      default: reset
      selector:
        text:
    dry_run:
      name: Simulazione
      description: Se attivo, scrive nel log cosa verrebbe rimosso senza eliminare entita.
      required: false
      selector:
        boolean:

request_event_log:
  name: Request event log
  description: Pubblica uno snapshot del log eventi sul bus Home Assistant.
  fields:
    limit:
      name: Limite eventi
      description: Numero massimo di eventi finali da includere.
      required: false
      selector:
        number:
          min: 1
          max: 500
          step: 1

clear_event_log:
  name: Clear event log
  description: Svuota il log eventi interno e notifica i sensori collegati.
  fields: {}
